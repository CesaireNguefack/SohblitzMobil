services:
  frontend:
    image: ghcr.io/cesairenguefack/sohblitz-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://sohblitz-mobil.de/api
    depends_on:
      - backend

  backend:
    image: ghcr.io/cesairenguefack/sohblitz-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3001"
    command: >
      sh -c "
        until nc -z db 5432;
        do
          echo 'Waiting for database...';
          sleep 2;
        done &&
        echo 'Running migrations...' &&
        npx prisma migrate deploy &&
        echo 'Starting app...' &&
        node dist/src/main.js
      "
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: cesaire
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: sohblitz
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
