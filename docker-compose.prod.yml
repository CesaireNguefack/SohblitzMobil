services:
  frontend:
    image: ghcr.io/CesaireNguefack/sohblitz-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: ghcr.io/CesaireNguefack/sohblitz-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    env_file:
      - .env

volumes:
  db_data:
