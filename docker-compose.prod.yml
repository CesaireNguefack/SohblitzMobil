services:
  frontend:
    image: ghcr.io/cesairenguefack/sohblitz-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    image: ghcr.io/cesairenguefack/sohblitz-backend:latest
    restart: always
    env_file:
      - .env
    ports:
      - "3001:3000"
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: cesaire
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: sohblitz
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
