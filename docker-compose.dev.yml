services:
  db:
    ports:
    - "5432:5432"
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: cesaire
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: sohblitz
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network

  backend:
    build: ./sohblitz-backend
    container_name: backend
    restart: always
    environment:
      NODE_ENV: docker_sublime_prod
      DATABASE_URL: postgresql://cesaire:changeme@db:5432/sohblitz
    depends_on:
      - db
    networks:
      - app_network
    command: >
      sh -c "
        until nc -z db 5432;
        do
          echo 'Waiting for database...';
          sleep 2;
        done &&
        echo 'Running migrations...' &&
        npx prisma migrate deploy &&
        echo 'Starting app...' &&
        node dist/src/main.js
      "

  frontend:
    build: ./sohblitz-frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app_network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network: